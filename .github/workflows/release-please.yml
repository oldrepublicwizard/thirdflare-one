name: Release Please

# Creates a release PR from Conventional Commits, then tags/releases on merge.
#
# Required repo setting (or Release Please fails with:
# "GitHub Actions is not permitted to create or approve pull requests"):
#   Settings → Actions → General → Workflow permissions
#   → Allow GitHub Actions to create and approve pull requests
#
# After a release is published, Package workflow builds artifacts and syncs
# config/update-manifest.json (see docs/UPDATES.md).

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
