name: Release Please

# Creates a release PR from Conventional Commits, then tags/releases on merge.
#
# Required repo setting (or Release Please fails with:
# "GitHub Actions is not permitted to create or approve pull requests"):
#   Settings → Actions → General → Workflow permissions
#   → Allow GitHub Actions to create and approve pull requests
#
# When a release is created, Package is invoked via workflow_call in the same
# push workflow. That avoids the GitHub limitation where events from
# GITHUB_TOKEN (release:published) do not start other workflows.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  package:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/package.yml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
      publish_release: true
      publish_ghcr: true
      update_homebrew_tap: true
      sync_manifest: true
    secrets: inherit
