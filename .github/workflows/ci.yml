name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      real_warp:
        description: Attempt real Cloudflare WARP smoke (Ubuntu; may skip if daemon unavailable)
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run npm check
        run: npm run check

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Shellcheck launchers and scripts
        run: |
          shellcheck --severity=warning bin/cloudflare-one-gui bin/cloudflare-one-tray
          shellcheck --severity=warning scripts/*.sh packaging/scripts/*.sh packaging/usr-bin-wrapper.sh packaging/appimage/AppRun
          chmod +x scripts/mock-warp-cli.sh scripts/ci-real-warp-smoke.sh

      - name: Stage packaging payload
        run: npm run package:stage

      - name: Verify staged tree
        run: |
          test -x dist/payload/usr/bin/cloudflare-one-gui
          test -f dist/payload/usr/lib/cloudflare-one-gui/server.js
          test -f dist/payload/usr/share/applications/cloudflare-one-gui.desktop

  warp-integration:
    name: WARP integration (mock)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run mock warp-cli integration tests
        run: |
          chmod +x scripts/mock-warp-cli.sh
          npm run test:integration

  warp-real:
    name: WARP real smoke (optional)
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'workflow_dispatch' && inputs.real_warp
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Real warp-cli smoke
        run: |
          chmod +x scripts/ci-real-warp-smoke.sh scripts/mock-warp-cli.sh
          bash scripts/ci-real-warp-smoke.sh

  package-smoke:
    name: Package build smoke
    runs-on: ubuntu-latest
    needs: [check, warp-integration]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 file rpm docker.io
          sudo systemctl start docker || sudo service docker start || true

      - name: Build and verify deb/rpm/arch
        run: |
          export PACKAGE_VERSION="0.0.0-ci.${{ github.run_number }}"
          bash packaging/scripts/build-deb-rpm.sh all
          bash packaging/scripts/verify-packages.sh deb-rpm
        env:
          PACKAGE_VERSION: 0.0.0-ci.${{ github.run_number }}

      - uses: actions/upload-artifact@v4
        with:
          name: ci-packages-deb-rpm
          path: dist/packages/*
          retention-days: 7
