name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      real_warp:
        description: Force Plane R real WARP smoke attempt
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plane-m:
    name: Plane M (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm deps
        run: npm install --no-fund --no-audit

      - name: Syntax check
        run: npm run check
        shell: bash

      - name: Plane M unit + integration + OpenAPI
        env:
          WARP_CLI: ${{ github.workspace }}/scripts/mock-warp-cli.mjs
        run: npm run test:all
        shell: bash

      - name: Shellcheck (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck --severity=warning bin/thirdflare bin/thirdflare-tray bin/cloudflare-one-gui bin/cloudflare-one-tray
          shellcheck --severity=warning scripts/*.sh packaging/scripts/*.sh packaging/usr-bin-wrapper.sh packaging/appimage/AppRun
          chmod +x scripts/mock-warp-cli.sh scripts/mock-warp-cli.mjs scripts/ci-real-warp-smoke.sh

      - name: Stage packaging payload (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          npm run package:stage
          test -x dist/payload/usr/bin/thirdflare
          test -f dist/payload/usr/lib/thirdflare/server.js
          test -f dist/payload/usr/share/applications/thirdflare.desktop

  ui-smoke:
    name: Playwright UI (mock)
    runs-on: ubuntu-latest
    needs: plane-m
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --no-fund --no-audit
      - name: Install Playwright Chromium
        env:
          PLAYWRIGHT_USE_BUNDLED: "1"
        run: npx playwright install --with-deps chromium
      - name: UI smoke
        env:
          WARP_CLI: ${{ github.workspace }}/scripts/mock-warp-cli.mjs
          PLAYWRIGHT_USE_BUNDLED: "1"
        run: npm run test:ui

  package-smoke:
    name: Package build smoke
    runs-on: ubuntu-latest
    needs: plane-m
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 file rpm
          docker version
      - name: Build and verify deb/rpm/arch
        run: |
          export PACKAGE_VERSION="0.0.0-ci.${{ github.run_number }}"
          bash packaging/scripts/build-deb-rpm.sh all
          bash packaging/scripts/verify-packages.sh deb-rpm
        env:
          PACKAGE_VERSION: 0.0.0-ci.${{ github.run_number }}
      - uses: actions/upload-artifact@v4
        with:
          name: ci-packages-deb-rpm
          path: dist/packages/*
          retention-days: 7

  warp-real:
    name: Plane R real WARP smoke
    runs-on: ubuntu-latest
    needs: plane-m
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.real_warp)
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Real warp-cli network smoke
        run: |
          chmod +x scripts/ci-real-warp-smoke.sh scripts/mock-warp-cli.mjs
          bash scripts/ci-real-warp-smoke.sh
