app-id: io.github.cloudflare_one_gui_linux.CloudflareOneGui
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
command: cloudflare-one-gui
finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=xdg-run/
  - --filesystem=xdg-cache/
  - --talk-name=org.freedesktop.Flatpak
  - --talk-name=org.freedesktop.Notifications
modules:
  - name: node
    buildsystem: simple
    build-commands:
      - |
        install -d /app/lib/node /app/bin
        tar -xJf node-v20.18.1-linux-x64.tar.xz -C /app/lib/node --strip-components=1
        ln -s /app/lib/node/bin/node /app/bin/node
    sources:
      - type: file
        url: https://nodejs.org/dist/v20.18.1/node-v20.18.1-linux-x64.tar.xz
        sha256: c6fa75c841cbffac851678a472f2a5bd612fff8308ef39236190e1f8dbb0e567
        dest-filename: node-v20.18.1-linux-x64.tar.xz

  - name: cloudflare-one-gui
    buildsystem: simple
    build-commands:
      - |
        install -d /app/lib/cloudflare-one-gui
        cp -a server.js package.json public assets scripts bin /app/lib/cloudflare-one-gui/
        chmod 0755 /app/lib/cloudflare-one-gui/bin/*
        install -d /app/bin
        cat > /app/bin/cloudflare-one-gui <<'EOF'
        #!/bin/bash
        export PATH="/app/lib/node/bin:/app/bin:${PATH}"
        export CLOUDFLARE_ONE_GUI_NODE="/app/lib/node/bin/node"
        exec /app/lib/cloudflare-one-gui/bin/cloudflare-one-gui "$@"
        EOF
        chmod 0755 /app/bin/cloudflare-one-gui
        install -Dm644 packaging/cloudflare-one-gui.desktop \
          /app/share/applications/io.github.cloudflare_one_gui_linux.CloudflareOneGui.desktop
        sed -i \
          -e 's|^Exec=.*|Exec=cloudflare-one-gui|' \
          -e 's|^Icon=.*|Icon=io.github.cloudflare_one_gui_linux.CloudflareOneGui|' \
          /app/share/applications/io.github.cloudflare_one_gui_linux.CloudflareOneGui.desktop
        sed -i '/^\[Desktop Action/,/^$/ s|^Icon=.*|Icon=io.github.cloudflare_one_gui_linux.CloudflareOneGui|' \
          /app/share/applications/io.github.cloudflare_one_gui_linux.CloudflareOneGui.desktop || true
        install -Dm644 assets/cloudflare-one-gui.svg \
          /app/share/icons/hicolor/scalable/apps/io.github.cloudflare_one_gui_linux.CloudflareOneGui.svg
        install -Dm644 packaging/flatpak/metainfo.xml \
          /app/share/metainfo/io.github.cloudflare_one_gui_linux.CloudflareOneGui.metainfo.xml
    sources:
      - type: dir
        path: ../..
        skip:
          - dist
          - .git
          - agentdecompile_projects
          - node_modules
          - packaging/flatpak/.flatpak-builder
          - packaging/flatpak/repo
          - packaging/flatpak/build
