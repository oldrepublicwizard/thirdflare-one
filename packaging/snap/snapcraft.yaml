name: thirdflare-one
base: core24
version: '0.1.0'
summary: ThirdFlare One — unofficial Cloudflare One client
description: |
  ThirdFlare One wraps the host Cloudflare WARP client (warp-cli) with a local API
  and optional browser UI. Classic confinement is required so the snap can reach
  host warp-cli and the WARP daemon. Install Cloudflare WARP separately:
  https://developers.cloudflare.com/warp-client/get-started/linux/
grade: stable
confinement: classic
license: MIT

apps:
  thirdflare-one:
    command: bin/thirdflare-one
    desktop: share/applications/thirdflare-one.desktop
    common-id: thirdflare-one

parts:
  thirdflare-one:
    plugin: nil
    source: .
    source-type: local
    build-packages:
      - rsync
    override-build: |
      set -euo pipefail
      install -d "$CRAFT_PART_INSTALL/usr/lib/thirdflare"
      rsync -a \
        --exclude '.git' \
        --exclude 'dist' \
        --exclude 'node_modules' \
        --exclude 'agentdecompile_projects' \
        --exclude 'packaging/flatpak' \
        "$CRAFT_PART_SRC/" "$CRAFT_PART_INSTALL/usr/lib/thirdflare/"
      rm -rf \
        "$CRAFT_PART_INSTALL/usr/lib/thirdflare/packaging" \
        "$CRAFT_PART_INSTALL/usr/lib/thirdflare/docs" \
        "$CRAFT_PART_INSTALL/usr/lib/thirdflare/.github" \
        "$CRAFT_PART_INSTALL/usr/lib/thirdflare/AGENTS.md"
      install -d "$CRAFT_PART_INSTALL/bin" "$CRAFT_PART_INSTALL/share/applications" \
        "$CRAFT_PART_INSTALL/share/icons/hicolor/scalable/apps"
      cat > "$CRAFT_PART_INSTALL/bin/thirdflare-one" <<'EOF'
      #!/bin/bash
      exec "$SNAP/usr/lib/thirdflare/bin/thirdflare" "$@"
      EOF
      chmod 0755 "$CRAFT_PART_INSTALL/bin/thirdflare-one"
      chmod 0755 "$CRAFT_PART_INSTALL/usr/lib/thirdflare/bin/"*
      install -m 0644 "$CRAFT_PART_SRC/packaging/thirdflare-one.desktop" \
        "$CRAFT_PART_INSTALL/share/applications/thirdflare-one.desktop"
      install -m 0644 "$CRAFT_PART_SRC/assets/thirdflare.svg" \
        "$CRAFT_PART_INSTALL/share/icons/hicolor/scalable/apps/thirdflare.svg"
    stage-packages:
      - nodejs
